<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>设备套餐 · Device Plans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --blue-800: #1e40af;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --emerald: #10b981;
      --amber: #f59e0b;
      --rose: #f43f5e;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(37, 99, 235, 0.12);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.12);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --font: "Noto Sans SC", "DM Sans", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: linear-gradient(165deg, var(--blue-50) 0%, var(--slate-50) 45%, #fff 100%);
      color: var(--slate-800);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100%;
      position: relative;
      padding: 12px 16px 100px;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeDown 0.45s var(--ease-out);
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .lang-toggle {
      display: flex;
      background: #fff;
      border-radius: 999px;
      padding: 3px;
      box-shadow: var(--shadow);
      border: 1px solid var(--blue-100);
    }

    .lang-toggle button {
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      color: var(--slate-500);
      transition: background 0.25s var(--ease-out), color 0.25s var(--ease-out), transform 0.2s;
    }

    .lang-toggle button.active {
      background: linear-gradient(135deg, var(--blue-600), var(--blue-500));
      color: #fff;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
    }

    .lang-toggle button:not(.active):active {
      transform: scale(0.96);
    }

    .page-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: -0.02em;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--slate-100);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
      transition: box-shadow 0.3s var(--ease-out), border-color 0.3s, transform 0.25s var(--ease-out);
    }

    .card.interactive:hover {
      border-color: var(--blue-200);
      box-shadow: var(--shadow);
    }

    .card.interactive:active {
      transform: scale(0.99);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--blue-600);
      margin-bottom: 10px;
    }

    .row-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .muted { color: var(--slate-500); font-size: 13px; }
    .small { font-size: 12px; }

    /* Links / chips */
    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue-600);
      background: var(--blue-50);
      padding: 8px 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }

    .link-chip:hover {
      background: var(--blue-100);
      color: var(--blue-800);
    }

    .link-chip:active { transform: scale(0.97); }

    /* Price highlight */
    .price {
      font-family: "DM Sans", var(--font);
      font-weight: 700;
      font-size: 22px;
      color: var(--blue-700);
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, var(--blue-800), var(--blue-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .price-sm {
      font-size: 17px;
    }

    .price-unit {
      font-size: 12px;
      font-weight: 600;
      color: var(--slate-500);
      -webkit-text-fill-color: var(--slate-500);
      margin-left: 2px;
    }

    /* Ring chart */
    .ring-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }

    .ring {
      width: 100px;
      height: 100px;
      position: relative;
      flex-shrink: 0;
    }

    .ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 12px rgba(37, 99, 235, 0.2));
    }

    .ring-bg { fill: none; stroke: var(--slate-100); stroke-width: 10; }
    .ring-fg {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 251.2;
      transition: stroke-dashoffset 0.9s var(--ease-out);
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .ring-pct {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue-700);
    }

    .ring-label { font-size: 10px; color: var(--slate-500); }

    /* Bar usage */
    .usage-bar {
      height: 8px;
      background: var(--slate-100);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .usage-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue-600), var(--blue-400));
      width: 0%;
      transition: width 0.8s var(--ease-out);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 1;
      min-width: 0;
      padding: 10px 8px;
      border: 1px solid var(--slate-200);
      background: #fff;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      color: var(--slate-600);
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      white-space: nowrap;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--blue-600), var(--blue-500));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .tab:not(.active):hover {
      border-color: var(--blue-200);
      color: var(--blue-700);
    }

    /* Package cards */
    .pkg-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pkg-card {
      border: 2px solid var(--slate-100);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .pkg-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.06), transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .pkg-card:hover::before { opacity: 1; }

    .pkg-card:hover {
      border-color: var(--blue-200);
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.1);
    }

    .pkg-card.selected {
      border-color: var(--blue-600);
      background: var(--blue-50);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .pkg-card.selected::after {
      content: "✓";
      position: absolute;
      top: 10px;
      right: 12px;
      width: 22px;
      height: 22px;
      background: var(--blue-600);
      color: #fff;
      font-size: 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop 0.35s var(--ease-out);
    }

    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Fixed bottom CTA */
    .bottom-cta {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 430px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, #fff 70%, rgba(255,255,255,0.92));
      border-top: 1px solid var(--slate-100);
      z-index: 50;
    }

    .btn-primary {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
      color: #fff;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s, opacity 0.3s;
    }

    .btn-primary:not(:disabled):hover {
      filter: brightness(1.05);
      box-shadow: 0 10px 28px rgba(37, 99, 235, 0.45);
    }

    .btn-primary:not(:disabled):active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      filter: grayscale(0.2);
    }

    .btn-secondary {
      width: 100%;
      border: 2px solid var(--blue-200);
      border-radius: 14px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      background: #fff;
      color: var(--blue-700);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: var(--blue-50);
      border-color: var(--blue-400);
    }

    /* Back nav */
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--blue-600);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      margin-bottom: 8px;
      transition: color 0.2s, transform 0.2s;
    }

    .nav-back:hover { color: var(--blue-800); }
    .nav-back:active { transform: translateX(-3px); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease-out);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-sheet {
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.4s var(--ease-out);
    }

    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--slate-900);
    }

    .modal-body {
      font-size: 14px;
      color: var(--slate-600);
      line-height: 1.55;
      margin-bottom: 20px;
    }

    /* Order list */
    .order-card {
      border-left: 4px solid var(--blue-500);
    }

    .status-pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .status-active { background: var(--blue-100); color: var(--blue-800); }
    .status-pending { background: #fef3c7; color: #b45309; }
    .status-done { background: var(--slate-100); color: var(--slate-600); }
    .status-refund { background: #fce7f3; color: #be185d; }

    /* Refund progress */
    .refund-track {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--slate-200);
    }

    .refund-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 8px 0 4px;
    }

    .refund-steps::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 12%;
      right: 12%;
      height: 3px;
      background: var(--slate-100);
      border-radius: 2px;
      z-index: 0;
    }

    .refund-step {
      position: relative;
      z-index: 1;
      text-align: center;
      flex: 1;
      font-size: 10px;
      color: var(--slate-400);
    }

    .refund-step .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--slate-200);
      margin: 0 auto 6px;
      border: 3px solid #fff;
      transition: background 0.3s, transform 0.3s var(--ease-out);
    }

    .refund-step.done .dot {
      background: var(--blue-600);
      transform: scale(1.05);
    }

    .refund-step.current .dot {
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.25);
    }

    .refund-step.done, .refund-step.current { color: var(--slate-700); font-weight: 600; }

    /* Form */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--slate-700);
    }

    .field label .req { color: var(--rose); }

    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid var(--slate-200);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 96px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus, input:focus {
      outline: none;
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .upload-zone {
      border: 2px dashed var(--blue-200);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      color: var(--slate-500);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover {
      border-color: var(--blue-400);
      background: var(--blue-50);
    }

    /* Payment methods */
    .pay-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 2px solid var(--slate-100);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .pay-row:hover { border-color: var(--blue-200); }
    .pay-row.selected {
      border-color: var(--blue-600);
      background: var(--blue-50);
    }

    .pay-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 14px;
    }

    /* Page transition */
    .page {
      display: none;
      animation: pageIn 0.4s var(--ease-out);
    }

    .page.active { display: block; }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .kv { display: grid; grid-template-columns: 1fr auto; gap: 6px 12px; font-size: 13px; }
    .kv dt { color: var(--slate-500); }
    .kv dd { font-weight: 600; text-align: right; }

    .device-id {
      font-family: "DM Sans", monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--slate-900);
      letter-spacing: 0.02em;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 100px;
      transform: translateX(-50%) translateY(20px);
      background: var(--slate-900);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s var(--ease-out);
      max-width: 90%;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .renew-inline {
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#2563eb" />
        <stop offset="100%" stop-color="#60a5fa" />
      </linearGradient>
    </defs>
  </svg>

  <div class="app">
    <header class="top-bar">
      <h1 class="page-title" id="appTitle">设备详情</h1>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" id="langZh" class="active">中文</button>
        <button type="button" id="langEn">EN</button>
      </div>
    </header>

    <!-- 5.1 Device detail -->
    <section id="page-detail" class="page active">
      <div class="card">
        <div class="section-label" data-i18n="sec_basic">基础信息</div>
        <div class="row-between" style="margin-bottom: 12px;">
          <div>
            <div class="muted small" data-i18n="lbl_device_no">设备号</div>
            <div class="device-id" id="detailDeviceId">DEV-8829-X1</div>
          </div>
        </div>
        <div class="row-between">
          <button type="button" class="link-chip" id="goDeviceList" data-i18n="btn_switch_device">切换设备</button>
          <button type="button" class="link-chip" id="goOrdersFromDetail" data-i18n="btn_order_history">历史订单</button>
        </div>
      </div>

      <div class="card">
        <div class="section-label" data-i18n="sec_plan_info">套餐信息</div>
        <div class="row-between" style="margin-bottom: 8px;">
          <span class="muted" data-i18n="lbl_plan_name">套餐名</span>
          <span style="font-weight: 600;" id="activePlanName">5G 畅享包 · 月付</span>
        </div>
        <div class="row-between" style="margin-bottom: 4px;">
          <span class="muted renew-inline" data-i18n="btn_renew">续订</span>
          <button type="button" class="link-chip renew-inline" id="btnRenew" style="padding: 6px 12px; font-size: 12px;" data-i18n="btn_renew_go">去续订</button>
        </div>
        <div class="ring-wrap">
          <div class="ring" id="ringChart">
            <svg viewBox="0 0 100 100" aria-hidden="true">
              <circle class="ring-bg" cx="50" cy="50" r="40" />
              <circle class="ring-fg" id="ringFg" cx="50" cy="50" r="40" />
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ringPct">62%</div>
              <div class="ring-label" data-i18n="lbl_remaining">剩余</div>
            </div>
          </div>
          <div style="flex: 1;">
            <div class="muted small" data-i18n="lbl_plan_remain">套餐剩余量</div>
            <div style="font-weight: 700; margin-top: 4px;" id="remainText">3.1 GB / 5 GB</div>
            <div class="muted small" style="margin-top: 12px;" data-i18n="lbl_remain_days">剩余时长（天）</div>
            <div style="font-weight: 600;" id="remainDays">18 <span class="muted" data-i18n="unit_days">天</span></div>
          </div>
        </div>
      </div>

      <div class="card" style="padding-bottom: 12px;">
        <div class="section-label" data-i18n="sec_buyable">可购套餐</div>
        <div class="tabs" role="tablist">
          <button type="button" class="tab active" data-tab="main" data-i18n="tab_main">主套餐</button>
          <button type="button" class="tab" data-tab="trial" data-i18n="tab_trial">体验套餐</button>
          <button type="button" class="tab" data-tab="addon" data-i18n="tab_addon">加油包</button>
        </div>
        <div class="pkg-grid" id="pkgList"></div>
      </div>
    </section>

    <!-- 5.2 Order -->
    <section id="page-order" class="page">
      <button type="button" class="nav-back" id="backFromOrder">← <span data-i18n="nav_back">返回</span></button>
      <div class="card">

      function t(key, vars) {
        const bundle = I18N[lang];
        let s = bundle[key] ?? key;
        if (vars && typeof s === "string") {
          Object.keys(vars).forEach((k) => {
            s = s.replace("{" + k + "}", vars[k]);
          });
        }
        return s;
      }

      function applyI18n() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const k = el.getAttribute("data-i18n");
          el.textContent = t(k);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
        });
        const page = document.querySelector(".page.active")?.id || "page-detail";
        const map = { "page-detail": "detail", "page-order": "order", "page-devices": "devices", "page-orders": "orders", "page-refund": "refund" };
        const titleKey = map[page];
        if (titleKey) document.getElementById("appTitle").textContent = I18N[lang].app_titles[titleKey];
      }

      function setLang(next) {
        lang = next;
        document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
        document.getElementById("langZh").classList.toggle("active", lang === "zh");
        document.getElementById("langEn").classList.toggle("active", lang === "en");
        applyI18n();
        renderPackages();
        renderPayChannels();
        renderDeviceCards();
        renderOrderCards();
        updateDetailTexts();
        if (state.selectedPkgId) syncOrderPage();
      }

      function showPage(id) {
        document.querySelectorAll(".page").forEach((p) => p.classList.remove("active"));
        const el = document.getElementById(id);
        if (el) el.classList.add("active");
        const detailCta = document.getElementById("detailCta");
        detailCta.style.display = id === "page-detail" ? "block" : "none";
        const map = { "page-detail": "detail", "page-order": "order", "page-devices": "devices", "page-orders": "orders", "page-refund": "refund" };
        document.getElementById("appTitle").textContent = I18N[lang].app_titles[map[id]] || "";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function updateRing(usedRatio) {
        const circumference = 2 * Math.PI * 40;
        const offset = circumference * (1 - usedRatio);
        const fg = document.getElementById("ringFg");
        fg.style.strokeDasharray = String(circumference);
        fg.style.strokeDashoffset = String(offset);
        const pct = Math.round((1 - usedRatio) * 100);
        document.getElementById("ringPct").textContent = pct + "%";
      }

      function updateDetailTexts() {
        const ap = state.activePlan;
        document.getElementById("detailDeviceId").textContent = state.currentDeviceId;
        document.getElementById("activePlanName").textContent = ap.nameKey === "—" ? (lang === "zh" ? "—" : "—") : ap.nameKey;
        const remain = ap.totalGb > 0 ? ap.totalGb - ap.usedGb : 0;
        const exhausted = ap.totalGb > 0 && remain <= 0;
        const remainEl = document.getElementById("remainText");
        if (ap.totalGb <= 0) {
          remainEl.textContent = t("no_plan_quota");
          remainEl.style.color = "var(--slate-500)";
        } else if (exhausted) {
          remainEl.textContent = t("traffic_exhausted");
          remainEl.style.color = "var(--rose)";
        } else {
          remainEl.textContent = `${remain.toFixed(1)} GB / ${ap.totalGb} GB`;
          remainEl.style.color = "";
        }
        document.getElementById("remainDays").innerHTML = `${ap.daysLeft} <span class="muted">${t("unit_days")}</span>`;
        const ratio = ap.totalGb > 0 ? ap.usedGb / ap.totalGb : 0;
        updateRing(Math.min(1, Math.max(0, ratio)));
      }

      function renderPackages() {
        const list = packages[state.tab] || [];
        const root = document.getElementById("pkgList");
        root.innerHTML = list
          .map((p) => {
            const selected = state.selectedPkgId === p.id ? "selected" : "";
            return `
              <div class="pkg-card ${selected}" data-pkg-id="${p.id}" role="radio" aria-checked="${state.selectedPkgId === p.id}">
                <div style="font-weight: 700; margin-bottom: 6px;">${p.name}</div>
                <div class="row-between">
                  <span class="muted small">${p.flow}</span>
                  <div><span class="price price-sm">¥${p.price}</span><span class="price-unit">${t("pkg_period")}</span></div>
                </div>
              </div>`;
          })
          .join("");
        root.querySelectorAll(".pkg-card").forEach((card) => {
          card.addEventListener("click", () => {
            if (state.tab === "addon" && !state.hasMainPlan) {
              document.getElementById("modalAddon").classList.add("open");
              document.getElementById("modalAddon").setAttribute("aria-hidden", "false");
              return;
            }
            state.selectedPkgId = card.getAttribute("data-pkg-id");
            renderPackages();
            document.getElementById("btnBuyNow").disabled = false;
          });
        });
        document.getElementById("btnBuyNow").disabled = !state.selectedPkgId;
      }

        document.getElementById("payChannels").innerHTML = payMethods
          .map(

          <div class="pay-row ${state.selectedPayId === m.id ? "selected" : ""}" data-pay="${m.id}">
            <div class="pay-icon">${m.id === "wechat" ? "W" : m.id === "alipay" ? "A" : "¥"}</div>
            <div style="flex:1;font-weight:600;">${t(m.key)}</div>
            <div style="color:var(--blue-600);font-weight:700;">${state.selectedPayId === m.id ? "●" : "○"}</div>
          </div>`
          )
          .join("");
        document.querySelectorAll("#payChannels .pay-row").forEach((row) => {
          row.addEventListener("click", () => {
            state.selectedPayId = row.getAttribute("data-pay");
            renderPayChannels();
          });
        });
      }

      function getSelectedPackage() {
        for (const tab of ["main", "trial", "addon"]) {
          const found = (packages[tab] || []).find((p) => p.id === state.selectedPkgId);
          if (found) return { ...found, tab };
        }
        return null;
      }

      function syncOrderPage() {
        const p = getSelectedPackage();
        document.getElementById("orderDeviceId").textContent = state.currentDeviceId;
        if (!p) return;
        document.getElementById("orderPlanName").textContent = p.name;
        document.getElementById("orderPlanPrice").textContent = "¥" + p.price;
        const months = p.months || (p.note ? 0 : 1);
        const validText =
          months > 0
            ? t("order_valid", { months: String(months * (p.periods || 1)) })
            : lang === "zh"
            ? p.note || "按套餐说明"
            : p.note || "Per plan terms";
        document.getElementById("orderPlanValid").textContent = validText;
      }

      function renderDeviceCards() {
        document.getElementById("deviceCards").innerHTML = devices
          .map((d) => {
            const pct =
              d.totalGb > 0 ? Math.min(100, Math.round((d.usedGb / d.totalGb) * 100)) : 0;
            const usedLabel = d.totalGb > 0 ? `${d.usedGb} GB` : "—";
            const totalLabel = d.totalGb > 0 ? `${d.totalGb} GB` : "—";
            return `
            <div class="card interactive" data-device="${d.id}" style="cursor:pointer;margin-bottom:12px;">
              <div class="device-id" style="margin-bottom:8px;">${d.id}</div>
              <div class="muted small">${t("device_usage")}</div>
              <div class="usage-bar"><div class="usage-bar-fill" style="width:${pct}%"></div></div>
              <div class="row-between" style="margin-top:8px;">
                <span class="small muted">${t("device_used_total", { used: usedLabel, total: totalLabel })}</span>
                <span class="small" style="font-weight:600;color:var(--blue-700);">${d.plan}</span>
              </div>
              <div class="muted small" style="margin-top:10px;">${t("plan_dates")}</div>
              <div class="small" style="font-weight:600;">${d.start} — ${d.end}</div>
            </div>`;
          })
          .join("");
        document.querySelectorAll("#deviceCards .card").forEach((c) => {
          c.addEventListener("click", () => {
            state.currentDeviceId = c.getAttribute("data-device");
            const dev = devices.find((x) => x.id === state.currentDeviceId);
            state.hasMainPlan = dev && dev.plan !== "—";
            state.activePlan = {
              nameKey: dev?.plan || "—",
              usedGb: dev?.usedGb ?? 0,
              totalGb: dev?.totalGb ?? 0,
              daysLeft: dev?.daysLeft ?? 0,
            };
            state.selectedPkgId = null;
            state.tab = "main";
            document.querySelectorAll(".tab").forEach((tb) => tb.classList.toggle("active", tb.getAttribute("data-tab") === "main"));
            updateDetailTexts();
            renderPackages();
            showPage("page-detail");
          });
        });
        requestAnimationFrame(() => {
          document.querySelectorAll(".usage-bar-fill").forEach((bar) => {
            const w = bar.style.width;
            bar.style.width = "0%";
            requestAnimationFrame(() => {
              bar.style.width = w;
            });
          });
        });
      }

      }

      function refundStepsHtml(order) {
        if (order.refundProgress == null) return "";
        const steps = [
          { key: "refund_step_apply", idx: 0 },
          { key: "refund_step_proc", idx: 1 },
          { key: order.refundRejected ? "refund_step_reject" : "refund_step_done", idx: 2 },
        ];
        return `
          <div class="refund-track">
            <div class="muted small">${t("refund_status")}</div>
            <div class="refund-steps">
              ${steps
                .map((s, i) => {
                  const rp = order.refundProgress;
                  const done = rp > i || (i === 2 && rp >= 2);
                  const current = rp === i && !done;
                  const cls = done ? "done" : current ? "current" : "";
                  return `<div class="refund-step ${cls}"><div class="dot"></div>${t(s.key)}</div>`;
                })
                .join("")}
            </div>
          </div>`;
      }

      function renderOrderCards() {
        document.getElementById("orderCards").innerHTML = orders
          .filter((o) => o.deviceId === state.currentDeviceId)
          .map((o) => {
            const refundBlock = refundStepsHtml(o);
            const refundBtn =
              o.canRefund
                ? `<button type="button" class="btn-secondary refund-btn" data-order="${o.id}" style="margin-top:12px;">${t("btn_refund")}</button>`
                : "";
            return `
            <div class="card order-card" style="margin-bottom:12px;">
              <div class="row-between" style="margin-bottom:10px;">
                <span class="status-pill ${o.status === "refunded" ? "status-done" : o.status === "refunding" ? "status-refund" : "status-active"}">${statusLabel(
                  o.status
                )}</span>
                <span class="price price-sm">¥${o.amount}</span>
              </div>
              <div class="kv" style="margin-top:8px;">
                <dt>${t("lbl_plan_name")}</dt><dd>${o.pkgName}</dd>
                <dt>${t("pkg_status")}</dt><dd>${pkgStatusLabel(o.pkgStatus)}</dd>
                <dt>${t("pkg_type")}</dt><dd>${pkgTypeLabel(o.pkgType)}</dd>
                <dt>${t("eff_time")}</dt><dd style="font-size:12px;">${o.start}</dd>
                <dt>${t("exp_time")}</dt><dd style="font-size:12px;">${o.end}</dd>
                <dt>${t("total_flow")}</dt><dd>${o.flow}</dd>
                <dt>${t("order_amount")}</dt><dd style="color:var(--blue-700);font-weight:700;">¥${o.amount}</dd>
                <dt>${t("trade_no")}</dt><dd style="font-size:11px;word-break:break-all;">${o.tradeNo}</dd>
                <dt>${t("merchant_no")}</dt><dd style="font-size:11px;">${o.merchant}</dd>
                <dt>${t("lbl_device_no")}</dt><dd class="device-id" style="font-size:13px;">${o.deviceId}</dd>
              </div>
              ${refundBlock}
              ${refundBtn}
            </div>`;
          })
          .join("");

        document.querySelectorAll(".refund-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            state.refundOrderId = btn.getAttribute("data-order");
            renderRefundForm();
            showPage("page-refund");
          });
        });
      }

      function renderRefundForm() {
        const o = orders.find((x) => x.id === state.refundOrderId);
        const kv = document.getElementById("refundOrderKv");
        if (!o) return;
        kv.innerHTML = `
          <dt>${t("lbl_device_no")}</dt><dd>${o.deviceId}</dd>
          <dt>${t("trade_no")}</dt><dd style="word-break:break-all;font-size:12px;">${o.tradeNo}</dd>
          <dt>${t("lbl_plan_name")}</dt><dd>${o.pkgName}</dd>
          <dt>${t("order_amount")}</dt><dd><span class="price price-sm">¥${o.amount}</span></dd>
        `;
        document.getElementById("refundReason").value = "";
        document.getElementById("btnRefundSubmit").disabled = true;
      }

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove("show"), 2200);
      }

      document.getElementById("langZh").addEventListener("click", () => setLang("zh"));
      document.getElementById("langEn").addEventListener("click", () => setLang("en"));

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          state.tab = tab.getAttribute("data-tab");
          state.selectedPkgId = null;
          renderPackages();
        });
      });

      document.getElementById("goDeviceList").addEventListener("click", () => {
        renderDeviceCards();
        showPage("page-devices");
      });

      document.getElementById("goOrdersFromDetail").addEventListener("click", () => {
        renderOrderCards();
        showPage("page-orders");
      });

      document.getElementById("btnRenew").addEventListener("click", () => {
        state.tab = "main";
        document.querySelectorAll(".tab").forEach((tb) => tb.classList.toggle("active", tb.getAttribute("data-tab") === "main"));
        state.selectedPkgId = packages.main[0]?.id || null;
        renderPackages();
        document.getElementById("btnBuyNow").disabled = !state.selectedPkgId;
        syncOrderPage();
        showPage("page-order");
      });

      document.getElementById("btnBuyNow").addEventListener("click", () => {
        if (!state.selectedPkgId) return;
        syncOrderPage();
        showPage("page-order");
      });

      document.getElementById("backFromOrder").addEventListener("click", () => showPage("page-detail"));
      document.getElementById("backFromDevices").addEventListener("click", () => showPage("page-detail"));
      document.getElementById("backFromOrders").addEventListener("click", () => showPage("page-detail"));
      document.getElementById("backFromRefund").addEventListener("click", () => showPage("page-orders"));

      document.getElementById("btnPay").addEventListener("click", () => {
        toast(t("toast_pay"));
      });

      document.getElementById("modalAddonOk").addEventListener("click", () => {
        document.getElementById("modalAddon").classList.remove("open");
        document.getElementById("modalAddon").setAttribute("aria-hidden", "true");
      });

      document.getElementById("modalAddon").addEventListener("click", (e) => {
        if (e.target.id === "modalAddon") {
          document.getElementById("modalAddon").classList.remove("open");
          document.getElementById("modalAddon").setAttribute("aria-hidden", "true");
        }
      });

      document.getElementById("refundReason").addEventListener("input", (e) => {
        document.getElementById("btnRefundSubmit").disabled = !e.target.value.trim();
      });

      document.getElementById("uploadZone").addEventListener("click", () => document.getElementById("fileInput").click());
      document.getElementById("fileInput").addEventListener("change", (e) => {
        const n = e.target.files?.length || 0;
        if (n) toast(t("files_selected", { n: String(n) }));
      });

      document.getElementById("btnRefundSubmit").addEventListener("click", () => {
        toast(t("toast_submit"));
        setTimeout(() => {
          renderOrderCards();
          showPage("page-orders");
        }, 600);
      });

      setLang("zh");
      renderPayChannels();
      updateDetailTexts();
      renderPackages();
    })();
  </script>
</body>
</html>
